<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytix Global</title>
    <style>
        :root { 
            --bg-main: #0f172a; 
            --card-bg: #1e293b; 
            --primary: #3b82f6; 
            --border: #334155;
            --text-light: #ffffff; 
            --text-gray: #94a3b8; 
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
            --accent-green: #10b981;
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; 
            background-color: var(--bg-main); 
            color: var(--text-light); 
            min-height: 100vh;
        }

        #sync-status { position: fixed; top: 15px; right: 15px; padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; display: none; background: #fef3c7; color: #92400e; z-index: 1000; }
        
        .container { padding: 20px; max-width: 1200px; margin: auto; display: none; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 20px; }
        
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .card h3 { margin-top: 0; color: var(--text-light); }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; background: #0f172a; color: white; }
        
        .btn { padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; color: white; margin-top: 10px; }
        .btn-blue { background: var(--primary); }
        .btn-secondary { background: #334155; }
        
        .act-btn { padding: 5px 8px; border-radius: 4px; font-size: 0.7rem; border: 1px solid var(--border); cursor: pointer; color: white; background: transparent; margin-right: 4px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); color: var(--text-gray); font-size: 0.9rem; }
        th { color: var(--text-light); text-transform: uppercase; font-size: 0.75rem; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .badge-in { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
        .badge-late { background: rgba(245, 158, 11, 0.2); color: var(--accent-amber); }
        .badge-absent { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }

        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 2000; justify-content: center; align-items: center; }
        .modal { background: #1e293b; width: 90%; max-width: 700px; max-height: 80vh; border-radius: 16px; padding: 25px; overflow-y: auto; border: 1px solid var(--border); position: relative; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .stat-box { padding: 12px; border-radius: 10px; border: 1px solid var(--border); text-align: center; background: #0f172a; }
        .stat-val { font-size: 1.1rem; font-weight: bold; display: block; }

        .login-screen { text-align: center; margin-top: 100px; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 16px; border: 1px solid var(--border); width: 350px; margin: auto; }

        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .stat-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div id="sync-status">☁️ SYNCING...</div>

<div id="modal-overlay">
    <div class="modal">
        <button onclick="closeModal()" style="position:absolute; right:20px; top:20px; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
        <h2 id="modalName">Employee</h2>
        <p id="modalMonth" style="color: var(--primary); font-weight: bold;"></p>
        <div class="stat-grid">
            <div class="stat-box"><span class="stat-val" id="mPresent">0</span><span>Days</span></div>
            <div class="stat-box"><span class="stat-val" id="mLate" style="color:var(--accent-amber)">0</span><span>Lates</span></div>
            <div class="stat-box"><span class="stat-val" id="mAbsent" style="color:var(--accent-red)">0</span><span>Absents</span></div>
            <div class="stat-box"><span class="stat-val" id="mSalary" style="color:var(--accent-green)">$0</span><span>Total</span></div>
        </div>
        <table id="modalLogTable">
            <thead><tr><th>Date</th><th>Status</th><th>Time</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h2>Analytix Global</h2>
        <button class="btn btn-blue" onclick="authAdmin()">Admin Login</button>
        <div style="margin: 15px 0; color: var(--text-gray);">OR</div>
        <button class="btn btn-secondary" style="background:#059669" onclick="showPanel('employee-panel')">Employees</button>
    </div>
</div>

<div id="admin-panel" class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2>Admin Panel</h2>
        <div style="display:flex; gap:10px;">
            <select id="monthSelector" style="width:auto; margin:0;" onchange="refreshAdminData()"></select>
            <button class="act-btn" onclick="location.reload()">Logout</button>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>Add Employee</h3>
            <input type="text" id="admName" placeholder="Name">
            <input type="number" id="admRate" placeholder="Daily Rate">
            <button class="btn btn-blue" onclick="addEmployee()">Register</button>
        </div>
        <div class="card">
            <h3>Payroll Summary</h3>
            <table id="payrollTable">
                <thead><tr><th>Name</th><th>Work</th><th>Salary</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h3 id="activityTitle">Live Activity</h3>
        <table id="logTable">
            <thead><tr><th>Date</th><th>Name</th><th>Status</th><th>Time</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="employee-panel" class="container">
    <div class="login-card">
        <h2>Employees</h2>
        <select id="empSelect" onfocus="loadEmployeesForSelection()"></select>
        <div style="display:flex; gap:10px">
            <button class="btn btn-blue" onclick="clockAction('In')">Clock In</button>
            <button class="btn btn-secondary" onclick="clockAction('Out')">Clock Out</button>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--text-gray); margin-top:20px; cursor:pointer;">← Exit</button>
    </div>
</div>

<script>
    const CLOUD_URL = "https://office-attendance-system-d04f9-default-rtdb.firebaseio.com/";

    function getMonthKey(d = new Date()) {
        return d.toLocaleString('default', { month: 'long', year: 'numeric' });
    }

    async function api(path, method = 'GET', body = null) {
        document.getElementById('sync-status').style.display = 'block';
        try {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);
            const response = await fetch(`${CLOUD_URL}${path}.json`, options);
            const data = await response.json();
            document.getElementById('sync-status').style.display = 'none';
            return data;
        } catch (e) { 
            document.getElementById('sync-status').innerText = "Error";
            return null;
        }
    }

    async function addEmployee() {
        const name = document.getElementById('admName').value;
        const rate = document.getElementById('admRate').value;
        if (!name || !rate) return alert("Fill all fields");
        await api(`employees/${Date.now()}`, 'PUT', { id: Date.now(), name, rate: parseFloat(rate) });
        document.getElementById('admName').value = ""; document.getElementById('admRate').value = "";
        refreshAdminData();
    }

    async function deleteEmployee(id, name) {
        if (!confirm(`Delete ${name}?`)) return;
        await api(`employees/${id}`, 'DELETE');
        refreshAdminData();
    }

    async function refreshAdminData() {
        const selectedMonth = document.getElementById('monthSelector').value;
        const emps = await api('employees') || {};
        const logs = await api('logs') || {};
        
        // 1. Update Payroll Table
        const pBody = document.querySelector('#payrollTable tbody');
        pBody.innerHTML = '';
        Object.values(emps).forEach(emp => {
            const empLogs = Object.values(logs).filter(l => l.empId == emp.id && l.month === selectedMonth);
            const present = [...new Set(empLogs.filter(l => l.type === 'In' || l.type === 'Late').map(l => l.date))].length;
            const lates = empLogs.filter(l => l.type === 'Late').length;
            const salary = (present - Math.floor(lates / 2)) * emp.rate;

            pBody.innerHTML += `<tr>
                <td onclick="viewReport('${emp.id}')" style="cursor:pointer;color:var(--primary)">${emp.name}</td>
                <td>${present} Days</td>
                <td>$${salary.toFixed(2)}</td>
                <td>
                    <button class="act-btn" onclick="viewReport('${emp.id}')">👁️</button>
                    <button class="act-btn" onclick="markAbsent('${emp.id}', '${emp.name}')">❌</button>
                    <button class="act-btn" onclick="deleteEmployee('${emp.id}', '${emp.name}')">🗑️</button>
                </td>
            </tr>`;
        });

        // 2. Update Live Activity Feed (FILTERED)
        document.getElementById('activityTitle').innerText = `Logs for ${selectedMonth}`;
        const lBody = document.querySelector('#logTable tbody');
        lBody.innerHTML = '';
        
        // Get logs, filter by month, and sort by date/time (newest first)
        const logEntries = Object.values(logs)
            .filter(log => log.month === selectedMonth)
            .sort((a, b) => new Date(b.date + ' ' + b.time) - new Date(a.date + ' ' + a.time));

        if (logEntries.length === 0) {
            lBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">No records found for this month.</td></tr>';
        } else {
            logEntries.forEach(l => {
                lBody.innerHTML += `<tr>
                    <td>${l.date}</td>
                    <td>${l.name}</td>
                    <td><span class="badge ${getBadge(l.type)}">${l.type}</span></td>
                    <td>${l.time}</td>
                </tr>`;
            });
        }
    }

    async function viewReport(id) {
        const month = document.getElementById('monthSelector').value;
        const emps = await api('employees') || {};
        const logs = await api('logs') || {};
        const empLogs = Object.values(logs).filter(l => l.empId == id && l.month === month).reverse();
        
        const present = [...new Set(empLogs.filter(l => l.type === 'In' || l.type === 'Late').map(l => l.date))].length;
        const lates = empLogs.filter(l => l.type === 'Late').length;
        const absents = empLogs.filter(l => l.type === 'Absent').length;
        const salary = (present - Math.floor(lates / 2)) * emps[id].rate;

        document.getElementById('modalName').innerText = emps[id].name;
        document.getElementById('modalMonth').innerText = month;
        document.getElementById('mPresent').innerText = present;
        document.getElementById('mLate').innerText = lates;
        document.getElementById('mAbsent').innerText = absents;
        document.getElementById('mSalary').innerText = `$${salary.toFixed(2)}`;

        document.querySelector('#modalLogTable tbody').innerHTML = empLogs.map(l => 
            `<tr><td>${l.date}</td><td><span class="badge ${getBadge(l.type)}">${l.type}</span></td><td>${l.time}</td></tr>`
        ).join('');
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    async function clockAction(type) {
        const id = document.getElementById('empSelect').value;
        if (!id) return alert("Select Name");
        const emps = await api('employees');
        const now = new Date();
        const hr = now.getHours();
        const min = now.getMinutes();
        let finalType = type;

        if (type === 'In') {
            const isLate = (hr === 20 && min > 15) || (hr > 20) || (hr >= 0 && hr < 4);
            if (isLate) finalType = 'Late';
        }

        await api('logs', 'POST', {
            empId: id, name: emps[id].name, type: finalType,
            date: now.toLocaleDateString(), month: getMonthKey(now),
            time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        });
        alert("Success!");
    }

    async function markAbsent(empId, empName) {
        if (!confirm(`Mark ${empName} absent?`)) return;
        await api('logs', 'POST', { empId, name: empName, type: 'Absent', date: new Date().toLocaleDateString(), month: getMonthKey(), time: 'MANUAL' });
        refreshAdminData();
    }

    function initMonths() {
        const sel = document.getElementById('monthSelector');
        const now = new Date();
        sel.innerHTML = "";
        for (let i = 0; i < 6; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const key = getMonthKey(d);
            sel.innerHTML += `<option value="${key}">${key}</option>`;
        }
    }

    async function loadEmployeesForSelection() {
        const emps = await api('employees') || {};
        document.getElementById('empSelect').innerHTML = '<option value="">-- Select --</option>' + 
            Object.values(emps).map(e => `<option value="${e.id}">${e.name}</option>`).join('');
    }

    function getBadge(t) { return t==='In'?'badge-in':t==='Late'?'badge-late':t==='Absent'?'badge-absent':''; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function authAdmin() { 
        if (prompt("Password:") === "Laptop96$$") { 
            showPanel('admin-panel'); 
            initMonths(); 
            refreshAdminData(); 
        } 
    }
    
    function showPanel(id) {
        document.getElementById('login-screen').style.display = 'none';
        document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id === 'employee-panel') loadEmployeesForSelection();
    }
</script>
</body>
</html>
